<div class="container mt-5" style="max-width: 400px;">
  <h3 class="text-center mb-4">Iniciar Sesión</h3>

  <form (ngSubmit)="login()">

    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input 
        type="text" 
        class="form-control"
        [(ngModel)]="usuario"
        name="usuario"
        required>
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input 
        type="password"
        class="form-control"
        [(ngModel)]="password"
        name="password"
        required>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Entrar
    </button>

    <div *ngIf="error" class="text-danger mt-3 text-center">
      {{ error }}
    </div>

  </form>
</div>
