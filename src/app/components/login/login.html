<div class="container mt-5">
  <h2>Login</h2>
  <form [formGroup]="formLogin" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <input type="text" class="form-control" formControlName="username" placeholder="Usuario">
    </div>
    <div class="mb-3">
      <input type="password" class="form-control" formControlName="password" placeholder="Contraseña">
    </div>
    <button class="btn btn-primary" type="submit">Entrar</button>
    <div class="text-danger mt-2" *ngIf="error">{{ error }}</div>
  </form>
</div>
