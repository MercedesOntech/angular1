<!-- login.html -->
<div class="container mt-5" style="max-width: 400px;">
  <h3 class="text-center mb-4">Iniciar Sesión</h3>

  <form (ngSubmit)="login()" #f="ngForm">

    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input 
        type="text" 
        class="form-control"
        [(ngModel)]="usuario"
        name="usuario"
        required
        #usuarioInput="ngModel">
      <div class="invalid-feedback" *ngIf="f.submitted && usuarioInput.errors?.['required']">
        El usuario es obligatorio
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input 
        type="password" 
        class="form-control"
        [(ngModel)]="password"
        name="password"
        required
        #passInput="ngModel">
      <div class="invalid-feedback" *ngIf="f.submitted && passInput.errors?.['required']">
        La contraseña es obligatoria
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Entrar
    </button>

    <div *ngIf="error" class="text-danger mt-3 text-center">
      {{ error }}
    </div>

  </form>
</div>
