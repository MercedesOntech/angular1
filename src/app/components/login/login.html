<div class="container mt-5" style="max-width: 400px;">
  <h2 class="mb-4 text-center">Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="login()">

    <!-- Usuario -->
    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input type="text" formControlName="username" class="form-control"
        [ngClass]="{'is-invalid': enviado && f.username.invalid}">
      <div class="invalid-feedback" *ngIf="f.username.errors?.required">El usuario es obligatorio.</div>
    </div>

    <!-- Contraseña -->
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" formControlName="password" class="form-control"
        [ngClass]="{'is-invalid': enviado && f.password.invalid}">
      <div class="invalid-feedback" *ngIf="f.password.errors?.required">La contraseña es obligatoria.</div>
    </div>

    <!-- Error login -->
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <!-- Botón login -->
    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>
</div>
