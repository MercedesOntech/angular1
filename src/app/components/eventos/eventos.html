<!-- eventos.html -->
<div class="container mt-4">
  <h2>Eventos</h2>

  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let evento of eventos; let i = index">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">{{ evento.titulo | mayusculas }}</h5>
          <p class="card-text">{{ evento.descripcion }}</p>
          <p class="card-text"><strong>Fecha:</strong> {{ evento.fecha | date:'dd/MM/yyyy' }}</p>
          <p class="card-text"><strong>Lugar:</strong> {{ evento.lugar }}</p>
          <p [ngStyle]="{'color': evento.precio > 100 ? 'red' : 'green'}" class="card-text">
            <strong>Precio:</strong> {{ evento.precio | currency:'EUR' }}
          </p>

          <!-- Botón Actualizar añadido -->
          <button class="btn btn-warning btn-sm mt-2 me-2" (click)="editarEvento(evento)">
            Actualizar
          </button>
          <button class="btn btn-danger btn-sm mt-2" (click)="eliminar(i)">
            Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="eventos.length === 0">
    <p>No hay eventos todavía</p>
  </div>
</div>
