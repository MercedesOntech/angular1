<div class="container mt-4">
  <h2>Lista de Eventos</h2>

  <!-- Mensaje si no hay eventos -->
  <div *ngIf="eventos.length === 0" class="alert alert-info">
    No hay eventos disponibles.
  </div>

  <!-- Listado de eventos -->
  <div *ngFor="let evento of eventos">
    <app-evento-card 
      [evento]="evento" 
      (borrar)="eliminarEvento($event)">
    </app-evento-card>
  </div>
</div>
