<div class="container mt-4">
  <h2>Lista de Eventos</h2>

  <div class="row">
    <div class="col-md-4" *ngFor="let evento of eventos">
      <app-evento-card [evento]="evento"></app-evento-card>
    </div>
  </div>

  <div *ngIf="eventos.length === 0" class="alert alert-info mt-3">
    No hay eventos creados todavía.
  </div>
</div>
