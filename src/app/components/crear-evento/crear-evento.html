<!-- src/app/components/crear-evento/crear-evento.html -->
<div class="container mt-4">
  <h2>{{ eventoEdit ? 'Editar Evento' : 'Crear Evento' }}</h2>

  <form #form="ngForm" (ngSubmit)="guardar(form)">

    <!-- Título -->
    <div class="mb-3">
      <label class="form-label">Título</label>
      <input type="text" class="form-control" name="titulo" [(ngModel)]="titulo"
             [ngClass]="{'is-invalid': enviado && form.controls['titulo']?.invalid}"
             required minlength="3">

      <!-- Mensajes de error con ngSwitch seguro -->
      <ng-container *ngIf="form.controls['titulo'] as tituloControl">
        <div [ngSwitch]="tituloControl.errors ? (tituloControl.errors['required'] ? 'required' : 'minlength') : null">
          <p *ngSwitchCase="'required'" class="text-danger">
            El título es obligatorio
          </p>
          <p *ngSwitchCase="'minlength'" class="text-danger">
            Mínimo 3 caracteres
          </p>
          <p *ngSwitchDefault></p>
        </div>
      </ng-container>
    </div>

    <!-- Descripción -->
    <div class="mb-3">
      <label class="form-label">Descripción</label>
      <textarea class="form-control" name="descripcion" [(ngModel)]="descripcion"
                [ngClass]="{'is-invalid': enviado && form.controls['descripcion']?.invalid}"
                required></textarea>
      <div class="invalid-feedback" *ngIf="form.controls['descripcion']?.errors?.['required']">
        La descripción es obligatoria
      </div>
    </div>

    <!-- Fecha -->
    <div class="mb-3">
      <label class="form-label">Fecha</label>
      <input type="date" class="form-control" name="fecha" [(ngModel)]="fecha"
             [ngClass]="{'is-invalid': enviado && form.controls['fecha']?.invalid}" required>
      <div class="invalid-feedback" *ngIf="form.controls['fecha']?.errors?.['required']">
        La fecha es obligatoria
      </div>
    </div>

    <!-- Lugar -->
    <div class="mb-3">
      <label class="form-label">Lugar</label>
      <input type="text" class="form-control" name="lugar" [(ngModel)]="lugar"
             [ngClass]="{'is-invalid': enviado && form.controls['lugar']?.invalid}" required>
      <div class="invalid-feedback" *ngIf="form.controls['lugar']?.errors?.['required']">
        El lugar es obligatorio
      </div>
    </div>

    <!-- Precio -->
    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input type="number" class="form-control" name="precio" [(ngModel)]="precio"
             [ngClass]="{'is-invalid': enviado && form.controls['precio']?.invalid}" required min="0">
      <div class="invalid-feedback" *ngIf="form.controls['precio']?.errors?.['required']">
        El precio es obligatorio
      </div>
      <div class="invalid-feedback" *ngIf="form.controls['precio']?.errors?.['min']">
        El precio no puede ser negativo
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      {{ eventoEdit ? 'Actualizar' : 'Guardar' }}
    </button>

  </form>
</div>
